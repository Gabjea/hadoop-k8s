{{- if .Values.seeder.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-hdfs-seeder
  namespace: default
  annotations:
    # This tells Helm: "Wait until the NameNode and DataNodes are running BEFORE starting this job!"
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret }}
      containers:
      - name: data-seeder
        image: "{{ .Values.global.registry }}/hadoop-namenode:latest"
        command: ["/bin/bash", "/scripts/seed.sh"]
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-hadoop-env
        volumeMounts:
        - name: script-volume
          mountPath: /scripts
      volumes:
      - name: script-volume
        configMap:
          name: {{ .Release.Name }}-seeder-script
          defaultMode: 0755
{{- end }}